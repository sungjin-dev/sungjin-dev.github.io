<!-- _includes/head/custom.html
     페이지가 그려지기 전에 저장된 테마를 적용 (다크↔라이트 깜빡임 방지)
     반드시 인라인이어야 함 — 외부 파일로 빼면 로드 전에 첫 화면이 그려짐 -->
<!-- Pretendard: 한국어 웹의 표준급 UI -->
<link rel="stylesheet" crossorigin
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
<script>
  (function () {
    var saved = localStorage.getItem('theme');
    var prefersLight = window.matchMedia('(prefers-color-scheme: light)').matches;
    document.documentElement.setAttribute('data-theme', saved || (prefersLight ? 'light' : 'dark'));
  })();
</script>

<!-- Mermaid 다이어그램 렌더링 -->
<script type="module">
  try {
    const { default: mermaid } = await import(
      "https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs"
    );

    const isLight = document.documentElement.getAttribute("data-theme") === "light";
    mermaid.initialize({
      startOnLoad: false,
      theme: isLight ? "neutral" : "dark",
      fontFamily: "'Pretendard Variable', Pretendard, sans-serif"
    });

    const renderMermaid = async () => {
      // rouge가 ```mermaid 를 감싸는 형태가 버전에 따라 달라서 두 경우 모두 잡는다
      const blocks = document.querySelectorAll(
        "div.language-mermaid, pre code.language-mermaid"
      );
      console.log("[mermaid] 발견된 블록 수:", blocks.length);

      blocks.forEach((el) => {
        // el이 code면 감싸는 pre(또는 highlighter-rouge div)까지 통째로 교체
        const target = el.closest("div.highlighter-rouge") || el.closest("pre") || el;
        const code = el.tagName === "CODE" ? el : el.querySelector("code");
        if (!code) return;
        const div = document.createElement("div");
        div.className = "mermaid";
        div.textContent = code.textContent;
        target.replaceWith(div);
      });

      await mermaid.run({ querySelector: ".mermaid" });
      console.log("[mermaid] 렌더링 완료");
    };

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", renderMermaid);
    } else {
      renderMermaid(); // 이미 DOM이 준비된 경우 즉시 실행
    }
  } catch (e) {
    console.error("[mermaid] 로드/렌더링 실패:", e);
  }
</script>

<style>
  /* mermaid 다이어그램 여백/정렬 — 코드블록 스타일이 아닌 그림처럼 보이게 */
  .mermaid {
    display: flex;
    justify-content: center;
    margin: 24px 0;
    background: transparent;
  }
  .mermaid svg {
    max-width: 100%;
    height: auto;
  }
</style>

<script type="module">
  import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11.4.0/dist/mermaid.esm.min.mjs';
  
  // 이미 다른 곳에서 mermaid가 초기화되었을 때 발생하는 충돌 방지
  try {
    mermaid.initialize({
      startOnLoad: false,
      theme: 'default',
      securityLevel: 'loose',
      suppressErrorRendering: true // 에러 발생 시 브라우저 콘솔 폭발 방지
    });
  } catch (e) {
    console.log("Mermaid 중복 초기화 방지 처리 완료");
  }

  document.addEventListener("DOMContentLoaded", function() {
    const targets = document.querySelectorAll('.mermaid, pre code.language-mermaid, pre.mermaid');
    
    if (targets.length === 0) return; // 변환할 다이어그램이 없으면 즉시 종료
    
    targets.forEach((el, idx) => {
      let container = el;
      if (el.tagName === 'CODE') container = el.parentElement;
      
      const codeText = el.textContent || el.innerText;
      
      // 이미 변환된 요소인지 체크 (중복 실행 방지)
      if (container.hasAttribute('data-processed')) return;
      
      const graphId = `mermaid-graph-${idx}`;
      const div = document.createElement('div');
      div.className = 'mermaid';
      div.id = graphId;
      div.innerHTML = codeText;
      
      container.setAttribute('data-processed', 'true');
      container.parentNode.replaceChild(div, container);
    });

    // 비동기 실행(Promise) 에러를 안전하게 catch 캐치
    mermaid.run().catch(err => {
      console.warn("Mermaid 렌더링 일시적 대기:", err.message);
    });
  });
</script>
