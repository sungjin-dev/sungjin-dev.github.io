<style>
  /* 사이드바 스크롤바 완전히 숨기기*/
  .sidebar {
    -ms-overflow-style: none; /* IE, Edge */
    scrollbar-width: none; /* Firefox */
  }
  .sidebar::-webkit-scrollbar {
    display: none; /* Chrome, Safari, Opera */
  }

  /* 커스텀 위젯 디자인 */
  .my-custom-sidebar-widget {
    margin-top: 2rem;
    padding-top: 1.5rem;
    border-top: 1px dashed #565f89;
  }
  .my-clock {
    text-align: center;

</style>

<script>
  // 1. 위젯 위치 이동 및 PC/모바일 상태 제어 (수정됨)
  document.addEventListener("DOMContentLoaded", function() {
    const sidebar = document.querySelector('.sidebar');
    const widget = document.querySelector('.my-custom-sidebar-widget');
    const detailsTag = document.querySelector('.mobile-widget-toggle'); // 접기 태그 찾기
    
    // 사이드바로 위젯 옮기기
    if (sidebar && widget) {
      sidebar.appendChild(widget);
      widget.style.display = 'block';
    }

    // 화면 크기에 따라 폴더 강제로 열고 닫기
    function handleResize() {
      if (!detailsTag) return;
      if (window.innerWidth >= 768) {
        detailsTag.setAttribute('open', 'true'); // PC: 무조건 열어둠
      } else {
        detailsTag.removeAttribute('open'); // 모바일: 닫아둠 (압축)
      }
    }

    handleResize(); // 로딩될 때 바로 실행
    window.addEventListener('resize', handleResize); // 창 크기 조절할 때도 알아서 실행
  });
</script>
