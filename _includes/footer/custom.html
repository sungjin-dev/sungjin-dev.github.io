<div class="my-custom-sidebar-widget">
  <details class="mobile-widget-toggle">
    <summary>🕒 시간 및 날씨 보기</summary>
    <div class="widget-content">

      <div class="my-clock">
        <div id="live-time"></div>
        <div id="live-date"></div>
      </div>

      <div class="weather-card">
        <div class="weather-title">
          서울 오늘 날씨
        </div>
        <div class="weather-body">
          <img
            id="weather-icon"
            src=""
            alt="weather">
          <div class="weather-info">
            <div id="weather-temp">--°C</div>
            <div id="weather-desc">불러오는 중...</div>
          </div>
        </div>
      </div>
         <div class="visitor-card">
           <div class="visitor-title">
              👤 Visitors
           </div>
  
           <div id="goatcounter-total">
          방문자 로딩중...
        </div>
      </div>
      <div class="latest-posts-card">

        <div class="latest-posts-title">
          📝 Latest Posts
        </div>
      
        <ul class="latest-posts-list">
          {% for post in site.posts limit:3 %}
            <li>
              <a href="{{ post.url | relative_url }}">
                {{ post.title }}
              </a>
      
              <div class="latest-post-date">
                {{ post.date | date: "%Y.%m.%d" }}
              </div>
            </li>
          {% endfor %}
        </ul>
      
      </div>
    </div>
  </details>
</div>

<style>
/* =========================
   사이드바 스크롤바 숨기기
========================= */
.sidebar {
  -ms-overflow-style: none;
  scrollbar-width: none;
}

.sidebar::-webkit-scrollbar {
  display: none;
}

/* =========================
   전체 위젯
========================= */
.my-custom-sidebar-widget {
  margin-top: 1rem;
  padding-top: 0.8rem;
  border-top: 1px dashed #565f89;
}

/* =========================
   summary
========================= */
.mobile-widget-toggle summary {
  cursor: pointer;
  margin-bottom: 8px;
}

/* =========================
   시계
========================= */
.my-clock {
  text-align: center;
  background: #1a1b26;
  border-radius: 8px;
  border-left: 4px solid #bb9af7;
  padding: 8px;
  margin-bottom: 4px;
}

#live-time {
  font-size: 1.6rem;
  font-weight: bold;
  color: #7dcfff;
  font-family: Consolas, monospace;
  line-height: 1.1;
}

#live-date {
  color: #9ece6a;
  font-size: 0.85rem;
  margin-top: 3px;
}

/* =========================
   날씨
========================= */
.weather-card {
  background: #1a1b26;
  border-radius: 8px;
  padding: 8px;
  margin-bottom: 4px;
}

.weather-title {
  text-align: center;
  color: #c0caf5;
  font-size: 0.85rem;
  margin-bottom: 6px;
}

.weather-body {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 10px;
}

#weather-icon {
  width: 48px;
  height: 48px;
}

#weather-temp {
  color: #7aa2f7;
  font-size: 1.5rem;
  font-weight: bold;
  line-height: 1;
}

#weather-desc {
  color: #a9b1d6;
  font-size: 0.8rem;
  margin-top: 2px;
}

/* =========================
   details 여백
========================= */
.mobile-widget-toggle {
  margin: 0;
  padding: 0;
}

.widget-content {
  margin-top: 4px;
}

.visitor-card{
    background:#1a1b26;
    border-radius:8px;
    border-left:4px solid #7aa2f7;   
    padding:10px;
    margin-top:4px;
    text-align:center;
}

.visitor-title{
    color:#c0caf5;
    margin-bottom:8px;
}

#goatcounter-total{
    color:#7dcfff;
    font-weight:bold;
}
.visitor-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin:6px 0;
}

.visitor-label{
    color:#a9b1d6;
}

.visitor-value{
    color:#7dcfff;
    font-weight:bold;
    font-size:1rem;
}  

/* =========================
   Latest Posts
========================= */

.latest-posts-card{
    background:#1a1b26;
    border-radius:8px;
    border-left:4px solid #9ece6a;
    padding:10px;
    margin-top:4px;
}

.latest-posts-title{
    color:#c0caf5;
    text-align:center;
    margin-bottom:10px;
}

.latest-posts-list{
    list-style:none;
    padding:0;
    margin:0;
}

.latest-posts-list li{
    margin:10px 0;
    padding-bottom:10px;
    border-bottom:1px solid rgba(255,255,255,.08);
}

.latest-posts-list li:last-child{
    border-bottom:none;
    padding-bottom:0;
}

.latest-posts-list a{
    color:#7dcfff;
    text-decoration:none;
    font-size:.9rem;
}

.latest-posts-list a:hover{
    color:#bb9af7;
} 
  
.latest-post-date{
    color:#8b949e;
    font-size:.75rem;
    margin-top:2px;
}

.latest-posts-list a{
    display:block;
    color:#7dcfff;
    text-decoration:none;
    font-size:.9rem;
    font-weight:600;

    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
}  

.latest-posts-list a{
    transition:.2s;
}

.latest-posts-list a:hover{
    color:#bb9af7;
    padding-left:4px;
}  

.latest-posts-card{
    background:#1a1b26;
    border-left:4px solid #9ece6a;
    border-radius:8px;
    padding:12px;
    margin-top:8px;
}  
  
</style>

<script>
/* =========================
   사이드바 이동
========================= */
document.addEventListener("DOMContentLoaded", function () {
  const sidebar = document.querySelector(".sidebar");
  const widget = document.querySelector(".my-custom-sidebar-widget");
  const detailsTag = document.querySelector(".mobile-widget-toggle");

  if (widget) {
    widget.style.display = "block";
  }

  if (sidebar && widget) {
    sidebar.appendChild(widget);
  }

  function handleResize() {
    if (!detailsTag) return;
    if (window.innerWidth >= 768) {
      detailsTag.setAttribute("open", "true");
    } else {
      detailsTag.removeAttribute("open");
    }
  }

  handleResize();
  window.addEventListener("resize", handleResize);
});

/* =========================
   시계
========================= */
function updateClock() {
  const now = new Date();
  const timeStr = now.toLocaleTimeString("ko-KR", {
    hour12: false,
    hour: "2-digit",
    minute: "2-digit",
    second: "2-digit"
  });
  const dateStr = now.toLocaleDateString("ko-KR", {
    year: "numeric",
    month: "2-digit",
    day: "2-digit",
    weekday: "short"
  });

  document.getElementById("live-time").innerText = timeStr;
  document.getElementById("live-date").innerText = dateStr;
}

updateClock();
setInterval(updateClock, 1000);

/* =========================
   OpenWeather
========================= */
async function loadWeather() {
  const API_KEY = '75b94b0a271713289690c3adcbefcb3a';
  try {
    const response = await fetch(
      `https://api.openweathermap.org/data/2.5/weather?q=Seoul&appid=${API_KEY}&units=metric&lang=kr`
    );
    const data = await response.json();

    document.getElementById("weather-temp").textContent =
      `${Math.round(data.main.temp)}°C`;
    document.getElementById("weather-desc").textContent =
      data.weather[0].description;
    document.getElementById("weather-icon").src =
      `https://openweathermap.org/img/wn/${data.weather[0].icon}@2x.png`;

  } catch (error) {
    document.getElementById("weather-desc").textContent = "날씨 로드 실패";
    console.error(error);
  }
}

loadWeather();
/* =========================
   Visitor Counter
========================= */

async function loadVisitors() {

  try {

    const res = await fetch(
      "https://tjdwlsl888.goatcounter.com/counter/%2F.json"
    );

    const data = await res.json();

    document.getElementById("goatcounter-total").innerHTML = `
      <div class="visitor-row">
        <span class="visitor-label">Today</span>
        <span class="visitor-value">${data.count_unique}</span>
      </div>

      <div class="visitor-row">
        <span class="visitor-label">Total</span>
        <span class="visitor-value">${data.count}</span>
      </div>
    `;

  } catch (e) {

    document.getElementById("goatcounter-total").textContent =
      "불러오기 실패";

    console.error(e);

  }

}

loadVisitors();
  
</script>

<script
  data-goatcounter="https://tjdwlsl888.goatcounter.com/count"
  async
  src="https://gc.zgo.at/count.js">
</script>
