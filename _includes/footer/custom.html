<style>
  .my-custom-sidebar-widget {
    margin-top: 2rem;
    padding-top: 1.5rem;
    border-top: 1px dashed #565f89;
  }
  .my-clock {
    text-align: center;
    margin-bottom: 20px;
    padding: 15px;
    background-color: #1a1b26;
    border-radius: 8px;
    border-left: 4px solid #bb9af7;
  }
  #live-time { font-size: 1.2em; font-weight: 700; color: #7dcfff; font-family: 'Consolas', monospace; }
  #live-date { font-size: 0.85em; color: #9ece6a; margin-top: 5px; }
</style>

<script>
  function updateClock() {
    const now = new Date();
    const timeStr = now.toLocaleTimeString('ko-KR', { hour12: false, hour: '2-digit', minute:'2-digit', second:'2-digit' });
    const dateStr = now.toLocaleDateString('ko-KR', { year: 'numeric', month: '2-digit', day: '2-digit', weekday: 'short' });
    if(document.getElementById('live-time')) {
        document.getElementById('live-time').innerText = timeStr;
        document.getElementById('live-date').innerText = dateStr;
    }
  }
  updateClock();
  setInterval(updateClock, 1000);
</script>
