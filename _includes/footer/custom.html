<!-- 사이드바 위젯: 시계/날씨/방문자/최근글 -->
  <link rel="stylesheet" href="{{ '/assets/css/sidebar-widget.css' | relative_url }}">

  <div class="my-custom-sidebar-widget">
    <details class="mobile-widget-toggle" open>
      <summary>시간 및 날씨 보기</summary>
      <div class="widget-content">
        
        <div class="my-clock">
          <div id="live-time"></div>
          <div id="live-date"></div>
        </div>

        <div class="weather-card">
          <div class="weather-title">서울 오늘 날씨</div>
          <div class="weather-body">
            <img id="weather-icon" alt="weather">
            <div class="weather-info">
              <div id="weather-temp">--°C</div>
              <div id="weather-desc">불러오는 중...</div>
            </div>
          </div>
        </div>

        <div class="visitor-card">
          <div class="visitor-title">👤 Visitors</div>
          <a href="https://tjdwlsl888.goatcounter.com" target="_blank" style="text-decoration:none;">
            <div class="my-beautiful-badge">
              <div class="badge-label">TOTAL VIEWS</div>
              <div class="badge-value" id="gc-total-count">...</div>
            </div>
          </a>
        </div>

        <div class="latest-posts-card">
          <div class="latest-posts-title">Latest Posts</div>
          <ul class="latest-posts-list">
            {% for post in site.posts limit:3 %}
              <li>
                <a href="{{ post.url | relative_url }}">{{ post.title }}</a>
                <div class="latest-post-date">{{ post.date | date: "%Y.%m.%d" }}</div>
              </li>
            {% endfor %}
          </ul>
        </div>

      </div>
    </details>
  </div>

  <script src="{{ '/assets/js/sidebar-widget.js' | relative_url }}"></script>

  <script
    data-goatcounter="https://tjdwlsl888.goatcounter.com/count"
    async
    src="https://gc.zgo.at/count.js">
  </script>
<!-- _includes/footer/custom.html
     우측 하단 플로팅 테마 토글 버튼 (스타일은 main.scss 17번 섹션) -->
<button id="theme-toggle" type="button" aria-label="다크/라이트 테마 전환">
  <span class="theme-toggle__icon" aria-hidden="true"></span>
</button>

<script>
  (function () {
    var btn = document.getElementById('theme-toggle');
    if (!btn) return;
    var icon = btn.querySelector('.theme-toggle__icon');

    function render() {
      var t = document.documentElement.getAttribute('data-theme');
      /* 아이콘은 "누르면 바뀔 모드"를 보여줌 */
      icon.textContent = (t === 'light') ? '🌙' : '☀️';
    }

    btn.addEventListener('click', function () {
      var next = document.documentElement.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      render();
    });

    render();
  })();
</script>
