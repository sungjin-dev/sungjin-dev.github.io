      <div class="my-clock">

      <div class="weather-card">

        </div>
        <div class="weather-body">

            id="weather-icon"

            alt="visitor badge">
        </a>

</div>

<style>
/* =========================
   사이드바 스크롤바 숨기기
========================= */
.sidebar {
  -ms-overflow-style: none;
  scrollbar-width: none;
}

.sidebar::-webkit-scrollbar {
  display: none;
}

/* =========================
   전체 위젯
========================= */
.my-custom-sidebar-widget {
  margin-top: 1rem;
  padding-top: 0.8rem;
  border-top: 1px dashed #565f89;
}

/* =========================
   summary
========================= */
.mobile-widget-toggle summary {
  cursor: pointer;
  margin-bottom: 8px;
}

/* =========================
   시계
========================= */
.my-clock {
  text-align: center;
  background: #1a1b26;
  border-radius: 8px;
  border-left: 4px solid #bb9af7;
  padding: 8px;
  margin-bottom: 4px;
}

#live-time {
  font-size: 1.6rem;
  font-weight: bold;
  color: #7dcfff;
  font-family: Consolas, monospace;
  line-height: 1.1;
}

#live-date {
  color: #9ece6a;
  font-size: 0.85rem;
  margin-top: 3px;
}

/* =========================
   날씨
========================= */
.weather-card {
  background: #1a1b26;
  border-radius: 8px;
  padding: 8px;
  margin-bottom: 4px;
}

.weather-title {
  text-align: center;
  color: #c0caf5;
  font-size: 0.85rem;
  margin-bottom: 6px;
}

.weather-body {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 10px;
}

#weather-icon {
  width: 48px;
  height: 48px;
}

#weather-temp {
  color: #7aa2f7;
  font-size: 1.5rem;
  font-weight: bold;
  line-height: 1;
}

#weather-desc {
  color: #a9b1d6;
  font-size: 0.8rem;
  margin-top: 2px;
}

/* =========================
   방문자
========================= */
.visitor-badge {
  text-align: center;
}

.visitor-badge img {
  height: 24px;
  width: auto;
  display: block;
  margin: 0 auto;
}

/* =========================
   details 여백
========================= */
.mobile-widget-toggle {
  margin: 0;
  padding: 0;
}

.widget-content {
  margin-top: 4px;
}
</style>

<script>
/* =========================
   사이드바 이동
========================= */
document.addEventListener("DOMContentLoaded", function () {
  const sidebar = document.querySelector(".sidebar");
  const widget = document.querySelector(".my-custom-sidebar-widget");
  const detailsTag = document.querySelector(".mobile-widget-toggle");

  if (widget) {
    widget.style.display = "block";
  }

  if (sidebar && widget) {
    sidebar.appendChild(widget);
  }

  function handleResize() {
    if (!detailsTag) return;
    if (window.innerWidth >= 768) {
      detailsTag.setAttribute("open", "true");
    } else {
      detailsTag.removeAttribute("open");
    }
  }

  handleResize();
  window.addEventListener("resize", handleResize);
});

/* =========================
   시계
========================= */
function updateClock() {
  const now = new Date();
  const timeStr = now.toLocaleTimeString("ko-KR", {
    hour12: false,
    hour: "2-digit",
    minute: "2-digit",
    second: "2-digit"
  });
  const dateStr = now.toLocaleDateString("ko-KR", {
    year: "numeric",
    month: "2-digit",
    day: "2-digit",
    weekday: "short"
  });

  document.getElementById("live-time").innerText = timeStr;
  document.getElementById("live-date").innerText = dateStr;
}

updateClock();
setInterval(updateClock, 1000);

/* =========================
   OpenWeather
========================= */
async function loadWeather() {
  const API_KEY = '75b94b0a271713289690c3adcbefcb3a';
  try {
    const response = await fetch(
      `https://api.openweathermap.org/data/2.5/weather?q=Seoul&appid=${API_KEY}&units=metric&lang=kr`
    );
    const data = await response.json();

    document.getElementById("weather-temp").textContent =
      `${Math.round(data.main.temp)}°C`;
    document.getElementById("weather-desc").textContent =
      data.weather[0].description;
    document.getElementById("weather-icon").src =
      `https://openweathermap.org/img/wn/${data.weather[0].icon}@2x.png`;

  } catch (error) {
    document.getElementById("weather-desc").textContent = "날씨 로드 실패";
    console.error(error);
  }
}

loadWeather();
</script>
