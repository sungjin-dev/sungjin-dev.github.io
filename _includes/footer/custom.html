<link rel="stylesheet" href="{{ '/assets/css/sidebar-widget.css' | relative_url }}">

<link rel="stylesheet" href="...">
<script src="..."></script>

<div class="my-custom-sidebar-widget">
  <details class="mobile-widget-toggle">
    <summary>시간 및 날씨 보기</summary>
    <div class="widget-content">
       <div class="my-clock">
        <div id="live-time"></div>
        <div id="live-date"></div>
      </div> 
    
      <div class="weather-card">
        <div class="weather-title">
          서울 오늘 날씨
        </div>
        <div class="weather-body">
          <img
            id="weather-icon"
            src=""
            alt="weather">
          <div class="weather-info">
            <div id="weather-temp">--°C</div>
            <div id="weather-desc">불러오는 중...</div>
          </div>
        </div>
      </div>
         <div class="visitor-card">
           <div class="visitor-title">
              👤 Visitors
           </div>
  
           <div id="goatcounter-total">
          방문자 로딩중...
        </div>
      </div>
      <div class="latest-posts-card">

        <div class="latest-posts-title">
          Latest Posts
        </div>
      
        <ul class="latest-posts-list">
          {% for post in site.posts limit:3 %}
            <li>
              <a href="{{ post.url | relative_url }}">
                {{ post.title }}
              </a>
      
              <div class="latest-post-date">
                {{ post.date | date: "%Y.%m.%d" }}
              </div>
            </li>
          {% endfor %}
        </ul>
      
      </div>
    </div>
  </details>
</div>



<script>
/* =========================
   사이드바 이동
========================= */
document.addEventListener("DOMContentLoaded", function () {
  const sidebar = document.querySelector(".sidebar");
  const widget = document.querySelector(".my-custom-sidebar-widget");
  const detailsTag = document.querySelector(".mobile-widget-toggle");

  if (widget) {
    widget.style.display = "block";
  }

  if (sidebar && widget) {
    sidebar.appendChild(widget);
  }

  function handleResize() {
    if (!detailsTag) return;
    if (window.innerWidth >= 768) {
      detailsTag.setAttribute("open", "true");
    } else {
      detailsTag.removeAttribute("open");
    }
  }

  handleResize();
  window.addEventListener("resize", handleResize);
});

/* =========================
   시계
========================= */
function updateClock() {
  const now = new Date();
  const timeStr = now.toLocaleTimeString("ko-KR", {
    hour12: false,
    hour: "2-digit",
    minute: "2-digit",
    second: "2-digit"
  });
  const dateStr = now.toLocaleDateString("ko-KR", {
    year: "numeric",
    month: "2-digit",
    day: "2-digit",
    weekday: "short"
  });

  document.getElementById("live-time").innerText = timeStr;
  document.getElementById("live-date").innerText = dateStr;
}

updateClock();
setInterval(updateClock, 1000);

/* =========================
   OpenWeather
========================= */
async function loadWeather() {
  const API_KEY = '75b94b0a271713289690c3adcbefcb3a';
  try {
    const response = await fetch(
      `https://api.openweathermap.org/data/2.5/weather?q=Seoul&appid=${API_KEY}&units=metric&lang=kr`
    );
    const data = await response.json();

    document.getElementById("weather-temp").textContent =
      `${Math.round(data.main.temp)}°C`;
    document.getElementById("weather-desc").textContent =
      data.weather[0].description;
    document.getElementById("weather-icon").src =
      `https://openweathermap.org/img/wn/${data.weather[0].icon}@2x.png`;

  } catch (error) {
    document.getElementById("weather-desc").textContent = "날씨 로드 실패";
    console.error(error);
  }
}

loadWeather();
/* =========================
   Visitor Counter
========================= */

async function loadVisitors() {

  try {

    const res = await fetch(
      "https://tjdwlsl888.goatcounter.com/counter/%2F.json"
    );

    const data = await res.json();

    document.getElementById("goatcounter-total").innerHTML = `
      <div class="visitor-row">
        <span class="visitor-label">Today</span>
        <span class="visitor-value">${data.count_unique}</span>
      </div>

      <div class="visitor-row">
        <span class="visitor-label">Total</span>
        <span class="visitor-value">${data.count}</span>
      </div>
    `;

  } catch (e) {

    document.getElementById("goatcounter-total").textContent =
      "불러오기 실패";

    console.error(e);

  }

}

loadVisitors();
  
</script>

<script
  data-goatcounter="https://tjdwlsl888.goatcounter.com/count"
  async
  src="https://gc.zgo.at/count.js">
</script>
