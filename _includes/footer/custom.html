<!-- _includes/footer/custom.html
     우측 하단 플로팅 테마 토글 버튼 (스타일은 main.scss 17번 섹션) -->
<button id="theme-toggle" type="button" aria-label="다크/라이트 테마 전환">
  <span class="theme-toggle__icon" aria-hidden="true"></span>
</button>

<script>
  (function () {
    var btn = document.getElementById('theme-toggle');
    if (!btn) return;
    var icon = btn.querySelector('.theme-toggle__icon');

    function render() {
      var t = document.documentElement.getAttribute('data-theme');
      /* 아이콘은 "누르면 바뀔 모드"를 보여줌 */
      icon.textContent = (t === 'light') ? '🌙' : '☀️';
    }

    btn.addEventListener('click', function () {
      var next = document.documentElement.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      render();
    });

    render();
  })();
</script>

<script>
(function () {
  var MIN_ZOOM = 0.65; // 이 비율 밑으로는 줄이지 않음 (너무 작아지는 것 방지)

  function fitTables() {
    var tables = document.querySelectorAll('.page__content table');

    tables.forEach(function (t) {
      // 표 안에 중첩된 표는 건너뜀 (바깥 표와 함께 축소됨)
      if (t.closest('td, th')) return;

      // 모바일(768px 이하)은 기존 가로 스크롤 방식 유지
      if (window.innerWidth <= 768) {
        t.style.zoom = '';
        t.classList.remove('table-overflow');
        return;
      }

      t.style.zoom = '';                       // 원래 크기로 되돌려 측정
      var cs = getComputedStyle(t.parentElement);
      var avail = t.parentElement.clientWidth
                - parseFloat(cs.paddingLeft)
                - parseFloat(cs.paddingRight);
        
      var natural = t.offsetWidth;

      if (natural > avail + 1) {
        var ratio = (avail / natural) * 0.995;   // 반올림 오차 대비 0.5% 여유
        if (ratio >= MIN_ZOOM) {
          t.style.zoom = ratio;                // 딱 본문 폭에 맞게 축소
          t.classList.remove('table-overflow');
        } else {
          t.style.zoom = MIN_ZOOM;             // 최소 배율까지만 줄이고
          t.classList.add('table-overflow');   // 나머지는 표 안에서만 스크롤
        }
      } else {
        t.classList.remove('table-overflow');
      }
    });
  }

  var timer;
  window.addEventListener('resize', function () {
    clearTimeout(timer);
    timer = setTimeout(fitTables, 150);
  });

  document.addEventListener('DOMContentLoaded', fitTables);
  window.addEventListener('load', fitTables);          // 이미지 로드 후 재측정
  if (document.fonts && document.fonts.ready) {
    document.fonts.ready.then(fitTables);              // D2Coding 적용 후 재측정
  }
})();
</script>

<script>
(function () {
  var content = document.querySelector('.page__content');
  // 본문이 없는 페이지(홈, 목록 등)나 짧은 글에서는 표시하지 않음
  if (!content || content.offsetHeight < window.innerHeight) return;

  var bar = document.createElement('div');
  bar.id = 'reading-progress';
  bar.innerHTML = '<div id="reading-progress__fill"></div>';
  document.body.appendChild(bar);

  var fill = document.getElementById('reading-progress__fill');
  var ticking = false;

  var toggle = document.getElementById('theme-toggle');

  function update() {
    var needBar = content.offsetHeight > window.innerHeight;
    bar.style.display = needBar ? '' : 'none';
    if (!needBar) { ticking = false; return; }
    var rect = content.getBoundingClientRect();
    var start = rect.top + window.scrollY;
    var end = start + content.offsetHeight - window.innerHeight;
    var progress = (window.scrollY - start) / (end - start);
    progress = Math.max(0, Math.min(1, progress));
    fill.style.width = (progress * 100) + '%';
    if (toggle) toggle.style.setProperty('--reading', progress);
    ticking = false;
  }

  window.addEventListener('scroll', function () {
    if (!ticking) {
      ticking = true;
      requestAnimationFrame(update);
    }
  }, { passive: true });

  window.addEventListener('resize', update);
  update();
})();
</script>


<script>
(function () {
  var AUTO_FOLD_LINES = 25;   // 이 줄 수를 넘으면 자동으로 접힘
  var PREVIEW_HEIGHT = 180;   // 접힌 상태에서 보여줄 높이(px)

  document.querySelectorAll('.page__content div.highlighter-rouge').forEach(function (block) {
    if (block.classList.contains('language-mermaid')) return;
    if (block.classList.contains('nofold')) return;

    var code = block.querySelector('pre code');
    if (!code) return;

    var lines = code.textContent.split('\n').length;
    var shouldFold = block.classList.contains('fold') || lines > AUTO_FOLD_LINES;
    if (!shouldFold) return;

    block.classList.add('code-folded');
    block.style.setProperty('--preview-h', PREVIEW_HEIGHT + 'px');

    var btn = document.createElement('button');
    btn.className = 'code-fold-btn';
    btn.type = 'button';
    btn.textContent = '코드 펼치기 (' + lines + '줄) ▼';

    btn.addEventListener('click', function () {
      var folded = block.classList.toggle('code-folded');
      btn.textContent = folded
        ? '코드 펼치기 (' + lines + '줄) ▼'
        : '코드 접기 ▲';
    });

    block.appendChild(btn);
  });
})();
</script>


<script>
(function () {
  var blocks = document.querySelectorAll('.page__content div.highlighter-rouge');

  blocks.forEach(function (block) {
    // mermaid는 렌더링되며 교체되므로 제외
    if (block.classList.contains('language-mermaid')) return;

    var code = block.querySelector('pre code') || block.querySelector('pre');
    if (!code) return;

    var btn = document.createElement('button');
    btn.className = 'code-copy-btn';
    btn.type = 'button';
    btn.textContent = '복사';
    btn.setAttribute('aria-label', '코드 복사');

    btn.addEventListener('click', function () {
      navigator.clipboard.writeText(code.textContent).then(function () {
        btn.textContent = '복사됨 ✓';
        btn.classList.add('copied');
        setTimeout(function () {
          btn.textContent = '복사';
          btn.classList.remove('copied');
        }, 1600);
      }).catch(function () {
        btn.textContent = '실패';
        setTimeout(function () { btn.textContent = '복사'; }, 1600);
      });
    });

    block.style.position = 'relative';
    block.appendChild(btn);
  });
})();
</script>

<script>
(function () {
  var btn = document.createElement('button');
  btn.id = 'scroll-top-btn';
  btn.type = 'button';
  btn.innerHTML = '↑';
  btn.setAttribute('aria-label', '맨 위로');
  document.body.appendChild(btn);

  btn.addEventListener('click', function () {
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });

  var visible = false;
  window.addEventListener('scroll', function () {
    var show = window.scrollY > window.innerHeight; // 한 화면 이상 내려가면 표시
    if (show !== visible) {
      visible = show;
      btn.classList.toggle('visible', show);
    }
  }, { passive: true });
})();
</script>
