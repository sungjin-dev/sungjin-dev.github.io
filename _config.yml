# =======================================================
# 사이트 기본 설정
# =======================================================
title: "한 개발자의 성장 블로그"
description: "필기 및 오답 노트와 개발 공부 기록"
baseurl: ""
url: "" # 깃허브 페이지 주소(https://아이디.github.io)를 나중에 여기에 입력하세요.

timezone: "Asia/Seoul" # 한국 시간대 설정 (포스팅 시간이 정확해집니다)

# =======================================================
# 테마 및 플러그인 설정
# =======================================================
remote_theme: "mmistakes/minimal-mistakes"
minimal_mistakes_skin: "dark"

plugins:
  - jekyll-include-cache
  - jekyll-paginate

search: true

# =======================================================
# 마크다운 렌더링 설정 (코드 블록 및 줄바꿈 최적화)
# =======================================================
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge
  hard_wrap: false

# =======================================================
# 작성자(Author) 정보
# =======================================================
author:
  name: "성진 (Sungjin)"
  avatar: "https://turbulentflux.com/wp-content/uploads/2020/09/20200831_Data_Information_Knowledge.png" 
  bio: "매일 코딩하는 꿈을 꾸는 청년"
  location: "South Korea"
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/sungjin-dev"
    - label: "Email"
      icon: "fas fa-fw fa-envelope-square"
      url: "mailto:tjdwlsl8888@gmail.com"

# =======================================================
# 블로그 글 기본 설정 (오른쪽 목차 메뉴 자동 고정)
# =======================================================
defaults:
  - scope:
      path: ""       # 블로그의 모든 경로에 있는
      type: "posts"
    values:
      layout: "single"  # 포스트 기본 레이아웃
      classes: wide
      toc: true         # 목차(TOC) 활성화
      toc_sticky: true  # 스크롤 시 목차 오른쪽 고정
